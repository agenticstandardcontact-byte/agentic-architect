name: Hashnode Draft Creator

# DISABLED — Hashnode GraphQL API requires Pro (paid since 2026-05-13).
# Cross-post manually: paste blog HTML into Hashnode editor, set canonical URL
# to the matching GitHub Pages article.
#
# https://hashnode.com/changelog/2026-05-13-graphql-api-paid-access
#
# To re-enable API automation later: restore hashnode-draft.yml from git history
# before this commit, add Pro on your publication, set GitHub secrets, uncomment push.

on:
  workflow_dispatch:
    inputs:
      post:
        description: 'Unused while API is disabled'
        required: false
        default: ''

jobs:
  skipped:
    runs-on: ubuntu-latest
    steps:
      - name: Hashnode API disabled
        run: |
          echo "Hashnode draft workflow is turned off (skip Hashnode API)."
          echo "Use dev.to automation and/or paste posts manually on hashnode.com."
          echo "Canonical URL must point at agenticstandardcontact-byte.github.io/agentic-architect/blog/"
