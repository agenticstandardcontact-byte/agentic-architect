name: Hashnode Draft Creator

# Creates an unpublished Hashnode draft when a numbered blog post is pushed.
# Canonical URL points at GitHub Pages (SEO stays home).
#
# Setup:
#   1. hashnode.com → Account → Developer → Generate new token
#   2. Publication ID: from your blog dashboard URL or Settings
#   3. GitHub secrets: HASHNODE_API_KEY, HASHNODE_PUBLICATION_ID
#   4. gh workflow run hashnode-draft.yml --ref main

on:
  push:
    branches: [main]
    paths:
      - 'blog/0*.html'
  workflow_dispatch:
    inputs:
      post:
        description: 'blog filename e.g. 02-scoped-singleton-di-bug.html (empty = changed or all eligible)'
        required: false
        default: ''

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create Hashnode drafts
        shell: python {0}
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
          POST_INPUT: ${{ github.event.inputs.post }}
        run: |
          import html
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request
          from html.parser import HTMLParser
          from pathlib import Path

          GQL = "https://gql.hashnode.com"
          SITE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          COVER = f"{SITE}/og-image-devto.jpg"
          POST_RE = re.compile(r"^blog/0\d+-.*\.html$")

          api_key = os.environ.get("HASHNODE_API_KEY", "").strip()
          pub_id = os.environ.get("HASHNODE_PUBLICATION_ID", "").strip()
          if not api_key or not pub_id:
              raise SystemExit("HASHNODE_API_KEY and HASHNODE_PUBLICATION_ID secrets required.")

          def gql(query, variables):
              payload = json.dumps({"query": query, "variables": variables}).encode("utf-8")
              req = urllib.request.Request(
                  GQL,
                  data=payload,
                  headers={
                      "Authorization": api_key,
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=45) as resp:
                      body = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  raise SystemExit(f"Hashnode HTTP {e.code}: {e.read().decode()}")
              if body.get("errors"):
                  raise SystemExit(f"Hashnode GraphQL errors: {body['errors']}")
              return body.get("data", {})

          # Reuse same HTML→markdown approach as devto-draft (inline, minimal)
          class ArticleHTML(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self._skip_depth = 0
                  self._in_article = False
                  self._capture = False
                  self._buf = []
                  self._stack = []
                  self.markdown_parts = []
                  self._link_href = None

              def handle_starttag(self, tag, attrs):
                  attrs_d = dict(attrs)
                  cls = attrs_d.get("class", "")
                  if tag == "article" and "post" in cls.split():
                      self._in_article = True
                  if not self._in_article:
                      return
                  if tag == "h1" and not self._capture:
                      self._capture = True
                      return
                  if not self._capture:
                      return
                  if tag == "hr" and "post-divider" in cls:
                      self._capture = False
                      return
                  if tag == "div" and ("post-cta" in cls or "post-cta-paid" in cls):
                      self._capture = False
                      return
                  if tag in ("script", "style"):
                      self._skip_depth += 1
                      return
                  if self._skip_depth:
                      self._skip_depth += 1
                      return
                  if tag == "h2":
                      self._flush_inline()
                      self.markdown_parts.append("\n## ")
                  elif tag == "h3":
                      self._flush_inline()
                      self.markdown_parts.append("\n### ")
                  elif tag == "p":
                      self._flush_inline()
                      self.markdown_parts.append("\n\n")
                  elif tag == "pre":
                      self._flush_inline()
                      self.markdown_parts.append("\n\n```\n")
                  elif tag == "code" and self._stack and self._stack[-1] != "pre":
                      self.markdown_parts.append("`")
                  elif tag in ("strong", "b"):
                      self.markdown_parts.append("**")
                  elif tag == "a":
                      href = attrs_d.get("href", "")
                      if href.startswith("../"):
                          href = SITE + "/" + href[3:]
                      self._link_href = href
                      self.markdown_parts.append("[")
                  self._stack.append(tag)

              def handle_endtag(self, tag):
                  if self._skip_depth:
                      self._skip_depth -= 1
                      return
                  if not self._capture:
                      if self._stack and self._stack[-1] == tag:
                          self._stack.pop()
                      return
                  if tag in ("h2", "h3", "p"):
                      self.markdown_parts.append("\n")
                  elif tag == "pre":
                      self.markdown_parts.append("\n```\n")
                  elif tag == "code" and len(self._stack) >= 2 and self._stack[-2] != "pre":
                      self.markdown_parts.append("`")
                  elif tag in ("strong", "b"):
                      self.markdown_parts.append("**")
                  elif tag == "a" and self._link_href:
                      self.markdown_parts.append(f"]({self._link_href})")
                      self._link_href = None
                  if self._stack and self._stack[-1] == tag:
                      self._stack.pop()

              def handle_data(self, data):
                  if self._skip_depth or not self._capture:
                      return
                  self._buf.append(html.unescape(data))

              def _flush_inline(self):
                  if self._buf:
                      self.markdown_parts.append("".join(self._buf))
                      self._buf.clear()

              def get_markdown(self):
                  self._flush_inline()
                  return re.sub(r"\n{3,}", "\n\n", "".join(self.markdown_parts)).strip()

          def parse_post(path):
              raw = path.read_text(encoding="utf-8")
              title_m = re.search(r"<title>(.*?)</title>", raw, re.I | re.S)
              desc_m = re.search(r'<meta name="description" content="([^"]*)"', raw, re.I)
              canon_m = re.search(r'<link rel="canonical" href="([^"]+)"', raw, re.I)
              if not title_m or not canon_m:
                  raise SystemExit(f"Missing title/canonical in {path}")
              p = ArticleHTML()
              p.feed(raw)
              body = p.get_markdown()
              if not body:
                  raise SystemExit(f"No body in {path}")
              canon = canon_m.group(1).strip()
              footer = (
                  f"\n\n---\n\n*Originally published at [{canon}]({canon}). "
                  f"[Agentic Architect]({SITE}/) — Cursor persistence for .NET.*"
              )
              return {
                  "title": html.unescape(title_m.group(1).strip()),
                  "subtitle": html.unescape(desc_m.group(1).strip()) if desc_m else "",
                  "canonical": canon,
                  "markdown": body + footer,
              }

          def targets():
              manual = os.environ.get("POST_INPUT", "").strip()
              if manual:
                  p = manual if manual.startswith("blog/") else f"blog/{manual}"
                  return [Path(p)]
              try:
                  out = subprocess.run(
                      ["git", "diff", "--name-only", "HEAD^", "HEAD"],
                      capture_output=True, text=True, check=True,
                  )
                  changed = [x for x in out.stdout.splitlines() if POST_RE.match(x.strip())]
                  if changed:
                      return [Path(x) for x in changed]
              except subprocess.CalledProcessError:
                  pass
              return sorted(Path("blog").glob("0*.html"))

          CREATE_DRAFT = """
          mutation CreateDraft($input: CreateDraftInput!) {
            createDraft(input: $input) {
              draft {
                id
                title
                slug
              }
            }
          }
          """

          created = 0
          for path in targets():
              if not path.exists():
                  continue
              meta = parse_post(path)
              variables = {
                  "input": {
                      "title": meta["title"],
                      "subtitle": meta["subtitle"],
                      "contentMarkdown": meta["markdown"],
                      "publicationId": pub_id,
                      "originalArticleURL": meta["canonical"],
                      "coverImageOptions": {"coverImageURL": COVER},
                      "tags": [
                          {"name": "csharp", "slug": "csharp"},
                          {"name": "dotnet", "slug": "dotnet"},
                      ],
                  }
              }
              print(f"Creating Hashnode draft: {meta['title']}")
              data = gql(CREATE_DRAFT, variables)
              draft = (data.get("createDraft") or {}).get("draft") or {}
              print(f"  -> draft id={draft.get('id')} slug={draft.get('slug')}")
              print("  Publish from Hashnode dashboard when ready.")
              created += 1

          print(f"Done. drafts_created={created}")
