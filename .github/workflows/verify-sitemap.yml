# Fail fast if sitemap.xml is not well-formed or loc URLs drift from project-site base.
name: Verify sitemap

on:
  push:
    branches: [main]
    paths:
      - 'sitemap.xml'
      - 'robots.txt'
      - '.nojekyll'
      - '.github/workflows/verify-sitemap.yml'
  pull_request:
    paths:
      - 'sitemap.xml'
      - 'robots.txt'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: XML well-formed (xmllint)
        run: xmllint --noout sitemap.xml

      - name: Sitemap bytes (no BOM, XML declaration, trailing newline)
        run: |
          python3 <<'PY'
          import sys
          from pathlib import Path

          raw = Path("sitemap.xml").read_bytes()
          if raw.startswith(b"\xef\xbb\xbf"):
              sys.exit("sitemap.xml must not have UTF-8 BOM")
          if not raw.startswith(b"<?xml"):
              sys.exit("sitemap.xml must start with <?xml")
          if b"encoding=\"UTF-8\"" not in raw[:120] and b"encoding='UTF-8'" not in raw[:120]:
              sys.exit("sitemap.xml must declare encoding UTF-8")
          if raw[-1:] not in (b"\n", b"\r"):
              sys.exit("sitemap.xml must end with a newline")
          if not Path(".nojekyll").is_file():
              sys.exit(".nojekyll missing (disables Jekyll on GitHub Pages)")
          print("OK: no BOM, XML header, trailing newline, .nojekyll present")
          PY

      - name: Sitemap loc and robots Sitemap line
        run: |
          python3 <<'PY'
          import re
          import sys
          from pathlib import Path
          from xml.etree import ElementTree as ET

          SITE_BASE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          NS = {"sm": "http://www.sitemaps.org/schemas/sitemap/0.9"}

          tree = ET.parse("sitemap.xml")
          root = tree.getroot()
          if root.tag != f"{{{NS['sm']}}}urlset":
              sys.exit(f"root must be urlset, got {root.tag}")

          locs = [e.text.strip() for e in root.findall("sm:url/sm:loc", NS) if e.text]
          if not locs:
              sys.exit("no <loc> entries")

          bad = [u for u in locs if not u.startswith(SITE_BASE + "/") and u != SITE_BASE + "/"]
          if bad:
              for u in bad:
                  print("loc outside project base:", u)
              sys.exit(1)

          robots = Path("robots.txt").read_text(encoding="utf-8")
          expected = f"Sitemap: {SITE_BASE}/sitemap.xml"
          if expected not in robots:
              sys.exit(f"robots.txt must contain: {expected}")

          print(f"OK: {len(locs)} URLs, robots Sitemap line present")
          PY
