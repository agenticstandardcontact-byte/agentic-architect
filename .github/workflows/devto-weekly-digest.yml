name: dev.to Weekly Digest

# Bundles the last 7 days of daily rules + essays from blog/index.html into a
# single dev.to article with canonical_url pointing back to the GitHub Pages
# blog. Solves the gap where daily rules never reach dev.to (devto-draft.yml
# only fires on blog/0*.html push). Compounding weekly SEO backlink to home.
#
# Triggers:
#   - Sundays 10:17 UTC (off-peak minute; pairs with daily-marketing at 09:17)
#   - workflow_dispatch (run any time for proof)
#
# Secret: DEVTO_API_KEY (already wired)
# Idempotency: canonical_url contains the week-of date so re-runs skip.

on:
  schedule:
    - cron: '17 10 * * 0'
  workflow_dispatch:
    inputs:
      as_of:
        description: 'Digest end-date (YYYY-MM-DD). Empty = today. Window is the 7 days ending here.'
        required: false
        default: ''
      publish:
        description: 'Publish live on dev.to (false = draft only)'
        type: boolean
        required: false
        default: true

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compose and post weekly digest to dev.to
        shell: python {0}
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          AS_OF: ${{ github.event.inputs.as_of }}
          PUBLISH: ${{ github.event_name == 'schedule' || github.event.inputs.publish }}
        run: |
          import datetime as dt
          import html
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from pathlib import Path

          API = "https://dev.to/api"
          SITE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          BLOG = f"{SITE}/blog/"
          COVER = f"{SITE}/og-image-devto.jpg"
          KIT = "https://agenticarchitect.gumroad.com/l/dotnet-persistence-kit"
          SAMPLE = f"https://github.com/agenticstandardcontact-byte/agentic-architect/blob/main/arch-core-lite.mdc"
          TAGS = ["csharp", "dotnet", "ai", "cursor"]

          api_key = os.environ.get("DEVTO_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("DEVTO_API_KEY secret missing.")

          def api_request(method, path, payload=None):
              headers = {
                  "api-key": api_key,
                  "Content-Type": "application/json",
                  "User-Agent": "agentic-architect-devto-bot",
              }
              data = json.dumps(payload).encode("utf-8") if payload is not None else None
              req = urllib.request.Request(f"{API}{path}", data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read().decode("utf-8")
                      return resp.status, json.loads(body) if body else {}
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode("utf-8", errors="ignore")
                  raise RuntimeError(f"dev.to {method} {path} failed: {e.code} {e.reason}\n{err_body}")

          # ----- Resolve the as-of date (window end-date) -----
          override = os.environ.get("AS_OF", "").strip()
          if override:
              try:
                  as_of = dt.date.fromisoformat(override)
              except ValueError:
                  raise SystemExit(f"Invalid AS_OF date: {override!r}. Use YYYY-MM-DD.")
          else:
              as_of = dt.date.today()
          window_start = as_of - dt.timedelta(days=6)
          print(f"Digest window: {window_start} → {as_of}")

          # ----- Parse blog/index.html for entries in the window -----
          page = Path("blog/index.html").read_text(encoding="utf-8")
          card_re = re.compile(
              r'<li class="post-card"(?P<attrs>[^>]*)>(?P<inner>.*?)</li>',
              re.DOTALL,
          )
          date_re = re.compile(r'<time datetime="(\d{4}-\d{2}-\d{2})"')
          tag_re = re.compile(r'<span class="post-tag">([^<]+)</span>')
          h2_re = re.compile(r'<h2>(.*?)</h2>', re.DOTALL)
          p_re = re.compile(r'<h2>.*?</h2>\s*<p>(.*?)</p>', re.DOTALL)
          href_re = re.compile(r'<a href="(0\d+-[^"\']+\.html)"')

          entries = []
          seen_keys = set()
          for m in card_re.finditer(page):
              inner = m.group("inner")
              d_m = date_re.search(inner)
              if not d_m:
                  continue
              try:
                  d = dt.date.fromisoformat(d_m.group(1))
              except ValueError:
                  continue
              if not (window_start <= d <= as_of):
                  continue
              tag = (tag_re.search(inner) or [None, ""])
              tag_text = tag.group(1).strip() if hasattr(tag, "group") else ""
              h2_m = h2_re.search(inner)
              p_m = p_re.search(inner)
              if not h2_m or not p_m:
                  continue
              # Unescape entities then re-escape bare angle brackets so dev.to's
              # markdown parser doesn't eat generics like Result<T> as HTML tags.
              def md_safe(s):
                  s = html.unescape(re.sub(r"\s+", " ", s)).strip()
                  return s.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")
              title = md_safe(h2_m.group(1))
              body = md_safe(p_m.group(1))
              href_m = href_re.search(inner)
              if href_m:
                  link = f"{BLOG}{href_m.group(1)}"
                  kind = "essay"
              else:
                  link = f"{BLOG}#{d.isoformat()}"
                  kind = "rule"
              key = (d, title)
              if key in seen_keys:
                  continue
              seen_keys.add(key)
              entries.append({
                  "date": d,
                  "tag": tag_text,
                  "title": title,
                  "body": body,
                  "link": link,
                  "kind": kind,
              })

          entries.sort(key=lambda e: (e["date"], 0 if e["kind"] == "essay" else 1), reverse=True)
          print(f"Found {len(entries)} entries in window")
          if not entries:
              raise SystemExit("No blog entries in the past 7 days — nothing to digest.")

          # ----- Compose the digest -----
          essays = [e for e in entries if e["kind"] == "essay"]
          rules = [e for e in entries if e["kind"] == "rule"]
          human_week = as_of.strftime("%B %d, %Y")
          rule_count = len(rules)
          essay_count = len(essays)

          headline_count = f"{rule_count} rule{'s' if rule_count != 1 else ''}"
          if essay_count:
              headline_count += f" + {essay_count} essay{'s' if essay_count != 1 else ''}"
          title = f"This week in Cursor + .NET — {headline_count} (week ending {human_week})"

          description = (
              f"A weekly digest from the Agentic Architect persistence kit: "
              f"{rule_count} senior C#/.NET rules"
              + (f" and {essay_count} new essay{'s' if essay_count != 1 else ''}" if essay_count else "")
              + " for engineers keeping Cursor honest across sessions."
          )

          lines = []
          lines.append(
              "*Every weekday a single, opinionated rule for senior C#/.NET engineers using Cursor. "
              "Here's the full week in one read — canonical posts live on "
              f"[the Agentic Architect blog]({BLOG}).*"
          )
          lines.append("")

          if essays:
              lines.append("## New essays this week")
              lines.append("")
              for e in essays:
                  lines.append(f"### [{e['title']}]({e['link']})")
                  lines.append(f"_{e['date'].strftime('%a %d %b')} · {e['tag']}_")
                  lines.append("")
                  lines.append(e["body"])
                  lines.append("")

          if rules:
              lines.append(f"## {rule_count} daily senior rule{'s' if rule_count != 1 else ''}")
              lines.append("")
              for r in rules:
                  lines.append(f"### {r['title']}")
                  lines.append(f"_{r['date'].strftime('%a %d %b')}_")
                  lines.append("")
                  lines.append(r["body"])
                  lines.append("")
                  lines.append(f"[→ Permalink on the blog]({r['link']})")
                  lines.append("")

          lines.append("---")
          lines.append("")
          lines.append("## Try one rule before you trust the whole kit")
          lines.append("")
          lines.append(
              f"The free **[`arch-core-lite.mdc`]({SAMPLE}?utm_source=devto&utm_medium=weekly_digest&utm_campaign=free_sample)** "
              "is one drop-in Cursor rule that ends the morning re-explanation ritual. "
              "Install in 60 seconds, see whether Cursor actually remembers your DI lifetimes, "
              "and decide for yourself whether the full kit is worth £19.99."
          )
          lines.append("")
          lines.append(
              f"- **Free sample:** [`arch-core-lite.mdc` on GitHub]({SAMPLE}?utm_source=devto&utm_medium=weekly_digest&utm_campaign=free_sample)"
          )
          lines.append(
              f"- **Full kit (£19.99, one-time):** [Agentic Architect on Gumroad]({KIT}?utm_source=devto&utm_medium=weekly_digest&utm_campaign=paid_kit)"
          )
          lines.append(
              f"- **Daily rules feed:** [{BLOG}]({BLOG}?utm_source=devto&utm_medium=weekly_digest&utm_campaign=blog_index)"
          )
          lines.append("")
          lines.append(
              f"Canonical home for everything in this digest: [{BLOG}]({BLOG})."
          )

          body_markdown = "\n".join(lines).strip() + "\n"

          # Unique canonical per digest — the BLOG URL serves the same page,
          # the query string makes the canonical distinct so dev.to dedup works.
          canonical_url = f"{BLOG}?week={as_of.isoformat()}"

          publish_live = os.environ.get("PUBLISH", "true").lower() == "true"

          # ----- Dedup: skip if a published article already has this canonical -----
          page_idx = 1
          existing = None
          while True:
              _, data = api_request("GET", f"/articles/me?per_page=100&page={page_idx}")
              items = data if isinstance(data, list) else []
              if not items:
                  break
              for art in items:
                  c = (art.get("canonical_url") or "").strip().rstrip("/")
                  if c == canonical_url.rstrip("/"):
                      existing = art
                      break
              if existing or len(items) < 100:
                  break
              page_idx += 1

          if existing and existing.get("published"):
              print(f"Skip: digest ending {as_of} already published → {existing.get('url')}")
              raise SystemExit(0)

          payload = {
              "article": {
                  "title": title,
                  "body_markdown": body_markdown,
                  "published": publish_live,
                  "tags": TAGS,
                  "canonical_url": canonical_url,
                  "description": description,
                  "main_image": COVER,
              }
          }

          if existing:
              art_id = existing.get("id")
              print(f"Updating existing draft id={art_id} → publish={publish_live}")
              _, data = api_request("PUT", f"/articles/{art_id}", payload)
          else:
              label = "Publishing" if publish_live else "Creating draft"
              print(f"{label}: {title}")
              _, data = api_request("POST", "/articles", payload)

          url = data.get("url") or "(see dev.to dashboard)"
          print(f"Done → {url}")
