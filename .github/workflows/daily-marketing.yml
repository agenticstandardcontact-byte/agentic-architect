name: Daily Senior Rule Publisher

# Publishes one rule from rules/persistence-kit.md per day to
# blog/index.html, updates sitemap + feed, and commits the change.
# This workflow NEVER touches README.md.

on:
  schedule:
    # 09:17 UTC daily. GitHub Actions drops a high percentage of schedules
    # pinned to the top of the hour ('0 * * * *') during peak load. An
    # off-peak minute (anything not 0/15/30/45) dramatically improves
    # delivery. Do not change back to '0 9 * * *'.
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-daily-rule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish today's rule
        shell: python {0}
        run: |
          import re
          import datetime
          from pathlib import Path

          SITE_BASE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          MARKER = "<!-- DAILY-RULE-INSERTION-POINT -->"
          CORPUS = Path("rules/persistence-kit.md")
          PAGE = Path("blog/index.html")
          SITEMAP = Path("sitemap.xml")
          FEED = Path("feed.xml")

          # ----- 1. Load corpus -----
          if not CORPUS.exists():
              raise SystemExit("rules/persistence-kit.md not found")

          rules = []
          current_title = None
          current_body = []
          rule_header = re.compile(r"^(Rule\s+\d+:\s*.+)$")
          for line in CORPUS.read_text(encoding="utf-8").splitlines():
              stripped = line.strip()
              m = rule_header.match(stripped)
              if m:
                  if current_title:
                      rules.append((current_title, " ".join(current_body).strip()))
                  current_title = m.group(1)
                  current_body = []
              elif current_title and stripped and not stripped.startswith("#") and not stripped.startswith(">"):
                  current_body.append(stripped)
          if current_title:
              rules.append((current_title, " ".join(current_body).strip()))

          if not rules:
              raise SystemExit("No rules parsed from corpus")

          # ----- 2. Pick today's rule deterministically -----
          today = datetime.date.today()
          idx = today.toordinal() % len(rules)
          title, body = rules[idx]
          today_iso = today.isoformat()
          today_human = today.strftime("%B %d, %Y")

          # RFC 822 date for RSS
          rfc822 = today.strftime("%a, %d %b %Y 09:00:00 +0000")

          print(f"Publishing rule {idx + 1}/{len(rules)} for {today_iso}: {title}")

          # ----- 3. Idempotency check -----
          if not PAGE.exists():
              raise SystemExit(
                  "blog/index.html missing — commit the bootstrap template first"
              )
          html = PAGE.read_text(encoding="utf-8")
          if f'data-date="{today_iso}"' in html:
              print(f"Today's rule ({today_iso}) is already present. Nothing to do.")
              raise SystemExit(0)

          # ----- 4. Insert new entry above the marker -----
          # Escape HTML in body/title (defensive, the corpus is trusted but cheap insurance)
          def esc(s):
              return (s.replace("&", "&amp;")
                       .replace("<", "&lt;")
                       .replace(">", "&gt;"))
          title_html = esc(title)
          body_html = esc(body)

          entry = f'''<li class="post-card" data-date="{today_iso}">
            <div class="post-link" style="cursor:default;">
              <div class="post-meta">
                <time datetime="{today_iso}">{today_human}</time>
                <span class="post-tag">Daily Rule</span>
              </div>
              <h2>{title_html}</h2>
              <p>{body_html}</p>
            </div>
          </li>'''

          if MARKER not in html:
              raise SystemExit(f"Marker {MARKER!r} not found in {PAGE}")
          html = html.replace(MARKER, MARKER + "\n          " + entry, 1)

          PAGE.write_text(html, encoding="utf-8")

          # ----- 4b. Sort all posts newest-first (shared script; essays before rules on same day) -----
          import subprocess
          subprocess.run(["python3", "scripts/sort-blog-index.py"], check=True)

          # ----- 5. Touch sitemap lastmod for the blog index -----
          sitemap_text = SITEMAP.read_text(encoding="utf-8")
          page_url = f"{SITE_BASE}/blog/"
          if page_url not in sitemap_text:
              # Append the URL block before </urlset>
              block = (f"  <url>\n"
                       f"    <loc>{page_url}</loc>\n"
                       f"    <lastmod>{today_iso}</lastmod>\n"
                       f"    <changefreq>daily</changefreq>\n"
                       f"    <priority>0.9</priority>\n"
                       f"  </url>\n")
              sitemap_text = sitemap_text.replace("</urlset>", block + "</urlset>")
          else:
              # Update or insert <lastmod> inside the daily-rules URL block
              # Find the block, update lastmod
              pattern = re.compile(
                  r"(<url>\s*<loc>" + re.escape(page_url) + r"</loc>)(.*?)(</url>)",
                  re.DOTALL,
              )
              def repl(m):
                  block = m.group(2)
                  if "<lastmod>" in block:
                      block = re.sub(r"<lastmod>.*?</lastmod>", f"<lastmod>{today_iso}</lastmod>", block)
                  else:
                      block = f"\n    <lastmod>{today_iso}</lastmod>" + block
                  return m.group(1) + block + m.group(3)
              sitemap_text = pattern.sub(repl, sitemap_text)
          SITEMAP.write_text(sitemap_text, encoding="utf-8")

          # ----- 6. Prepend new RSS item to feed.xml -----
          feed_text = FEED.read_text(encoding="utf-8")
          item = (
              f"    <item>\n"
              f"      <title>{title_html}</title>\n"
              f"      <link>{page_url}#{today_iso}</link>\n"
              f"      <guid isPermaLink=\"false\">daily-rule-{today_iso}</guid>\n"
              f"      <pubDate>{rfc822}</pubDate>\n"
              f"      <description>{body_html}</description>\n"
              f"    </item>\n\n"
          )
          # Insert after the <atom:link ... /> line (top of <channel>)
          atom_marker = re.search(r"<atom:link[^/]*/>\s*\n", feed_text)
          if atom_marker:
              insert_at = atom_marker.end()
              feed_text = feed_text[:insert_at] + "\n" + item + feed_text[insert_at:]
          else:
              feed_text = feed_text.replace("</channel>", item + "  </channel>")
          FEED.write_text(feed_text, encoding="utf-8")

          print("Wrote: blog/index.html, sitemap.xml, feed.xml")

      - name: Commit and push
        id: commit
        run: |
          git config user.name "Agentic Architect Bot"
          git config user.email "bot@agenticarchitect.com"
          git add blog/index.html sitemap.xml feed.xml
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily Senior Rule: $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping IndexNow
        if: steps.commit.outputs.changed == 'true'
        shell: python {0}
        run: |
          import json
          import urllib.request
          import urllib.error

          HOST = "agenticstandardcontact-byte.github.io"
          SITE_BASE = f"https://{HOST}/agentic-architect"
          KEY = "b7d4f8a21c5e6f9d3a8b7c4e1d2f5a9c"

          urls = [
              f"{SITE_BASE}/blog/",
              f"{SITE_BASE}/sitemap.xml",
              f"{SITE_BASE}/feed.xml",
          ]

          payload = {
              "host": HOST,
              "key": KEY,
              "keyLocation": f"{SITE_BASE}/{KEY}.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/IndexNow",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"IndexNow: {resp.status} {resp.reason}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="ignore")
              print(f"IndexNow HTTPError: {e.code} {e.reason}\n{body}")
              if e.code >= 500:
                  raise
