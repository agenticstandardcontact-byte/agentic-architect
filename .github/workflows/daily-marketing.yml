name: README Janitor
on:
  workflow_dispatch: # This lets you trigger it manually

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Overwrite Broken README
        run: |
          echo "# 🚀 Agentic Architect: .NET Persistence Suite" > README.md
          echo "" >> README.md
          echo "**Professional .MDC Persistence Rules for Senior .NET Architects.**" >> README.md
          echo "" >> README.md
          echo "[👉 Get the Full Suite on Gumroad](https://agenticarchitect.gumroad.com/l/dotnet-persistence-kit)" >> README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "## 🛠️ Daily Senior Rule Update" >> README.md
          echo "" >> README.md
          echo "> **Rule 1: The Result Pattern**" >> README.md
          echo "" >> README.md
          echo "---" >> README.md

      - name: Commit Cleanup
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Fixed README overflow"
          git push
