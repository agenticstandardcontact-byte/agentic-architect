name: Daily Marketing Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Tip
        run: |
          # 1. Grab a random rule
          SELECTED_RULE=$(grep "Rule " rules/persistence-kit.md | shuf -n 1)
          
          # 2. Use a "placeholder" file to swap the content safely
          # This avoids the 'no previous regular expression' error
          sed -e "//,//c\\n> $SELECTED_RULE\n" README.md > README.tmp && mv README.tmp README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Auto-update: Daily Senior .NET Rule" || exit 0
          git push
