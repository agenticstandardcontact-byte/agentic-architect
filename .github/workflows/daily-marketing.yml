name: Daily Marketing Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Tip
        run: |
          # 1. Grab a random rule from the correct folder/file path
          # We look for lines starting with 'Rule' inside the 'rules' folder
          SELECTED_RULE=$(grep "Rule " rules/persistence-kit.md | shuf -n 1)
          
          # 2. Append it to the README with a clean separator
          echo -e "\n\n---\n### 🛠️ Daily Senior Rule Update\n> $SELECTED_RULE\n" >> README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Auto-update: Daily Tip" || exit 0
          git push
