name: Daily Marketing Engine
on:
  schedule:
    - cron: '0 9 * * *' # Runs at 9 AM daily
  workflow_dispatch:   # Manual trigger for testing

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Tip with Python
        run: |
          python3 -c "
          import random

          # 1. Load rules from your library
          try:
              with open('rules/persistence-kit.md', 'r') as f:
                  rules = [line.strip() for line in f if line.startswith('Rule ')]
          except FileNotFoundError:
              print('Error: rules/persistence-kit.md not found')
              exit(1)

          if not rules:
              print('Error: No rules found in file')
              exit(1)

          selected = random.choice(rules)

          # 2. Update README surgically
          with open('README.md', 'r') as f:
              lines = f.readlines()

          new_lines = []
          inside_tag = False
          for line in lines:
              if '' in line:
                  new_lines.append(line)
                  new_lines.append(f'> **{selected}**\n')
                  inside_tag = True
              elif '' in line:
                  new_lines.append(line)
                  inside_tag = False
              elif not inside_tag:
                  new_lines.append(line)

          with open('README.md', 'w') as f:
              f.writelines(new_lines)
          "
          
      - name: Commit and Push
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Auto-update: Daily Senior .NET Rule" || exit 0
          git push
