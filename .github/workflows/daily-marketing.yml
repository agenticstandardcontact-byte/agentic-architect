name: Daily Marketing Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Tip with Python
        run: |
          python3 -c "
          import random, re

          # 1. Get a random rule
          with open('rules/persistence-kit.md', 'r') as f:
              rules = [line.strip() for line in f if line.startswith('Rule ')]
          selected = random.choice(rules) if rules else 'No rules found'

          # 2. Update README
          with open('README.md', 'r') as f:
              content = f.read()

          pattern = r'.*?'
          replacement = f'\n> **{selected}**\n'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(new_content)
          "
          
      - name: Commit and Push
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Auto-update: Daily Senior .NET Rule" || exit 0
          git push
