name: Daily Marketing Engine
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # Updated to v6
      
      - name: Pick a Random Rule and Update
        run: |
          SELECTED_RULE=$(grep "^Rule " rules-library.md | shuf -n 1)
          sed -i "/Today's Featured Pattern:/!b;n;c> **$SELECTED_RULE**" README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "Agentic Architect Bot"
          git config --global user.email "bot@agenticarchitect.com"
          git add README.md
          git commit -m "Auto-update: Daily Senior .NET Rule"
          git push
