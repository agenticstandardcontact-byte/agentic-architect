name: IndexNow Ping

# Tells Bing (and Yandex, Seznam, Naver) about changed pages within seconds
# of a push to main. Free, no API key registration, no rate limits to worry
# about for a single small site.
#
# Verification key file: b7d4f8a21c5e6f9d3a8b7c4e1d2f5a9c.txt at repo root.
# Public per IndexNow spec — Bing fetches it to verify ownership.

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'feed.xml'
  workflow_dispatch:

jobs:
  ping-indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed URLs and submit to IndexNow
        shell: python {0}
        run: |
          import json
          import subprocess
          import urllib.request
          from pathlib import Path

          HOST = "agenticstandardcontact-byte.github.io"
          SITE_BASE = f"https://{HOST}/agentic-architect"
          KEY = "b7d4f8a21c5e6f9d3a8b7c4e1d2f5a9c"
          KEY_LOCATION = f"{SITE_BASE}/{KEY}.txt"

          # Get list of files changed in the most recent push
          try:
              result = subprocess.run(
                  ["git", "diff", "--name-only", "HEAD^", "HEAD"],
                  capture_output=True, text=True, check=True,
              )
              changed = result.stdout.strip().splitlines()
          except subprocess.CalledProcessError:
              # First commit on main, or shallow clone — fall back to all HTML
              changed = []

          # Map repo paths to public URLs
          url_list = set()
          for path in changed:
              if not path:
                  continue
              p = path.strip()
              if p.endswith(".html"):
                  # blog/foo.html -> .../blog/foo.html
                  # index.html    -> .../index.html
                  url_list.add(f"{SITE_BASE}/{p}")
              elif p == "sitemap.xml" or p == "feed.xml":
                  url_list.add(f"{SITE_BASE}/{p}")

          # If nothing identifiable changed, always ping the root + sitemap
          if not url_list:
              url_list = {f"{SITE_BASE}/", f"{SITE_BASE}/sitemap.xml"}

          # Always include the daily-rules page if it exists (catches the bot commits)
          dr = Path("blog/daily-rules.html")
          if dr.exists():
              url_list.add(f"{SITE_BASE}/blog/daily-rules.html")

          urls = sorted(url_list)
          print(f"Submitting {len(urls)} URLs to IndexNow:")
          for u in urls:
              print(f"  {u}")

          payload = {
              "host": HOST,
              "key": KEY,
              "keyLocation": KEY_LOCATION,
              "urlList": urls,
          }
          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              "https://api.indexnow.org/IndexNow",
              data=data,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"IndexNow response: {resp.status} {resp.reason}")
          except urllib.error.HTTPError as e:
              # 200/202 = success, 422 = invalid URL list (often partial success), 4xx = config issue
              body = e.read().decode("utf-8", errors="ignore")
              print(f"IndexNow HTTPError: {e.code} {e.reason}\n{body}")
              # Don't fail the workflow on 4xx — log and move on
              if e.code >= 500:
                  raise
