name: Kit Newsletter Syndication

# Syncs numbered blog posts to Kit (formerly ConvertKit) as scheduled broadcasts.
# Canonical URL stays on GitHub Pages; the email is just a syndication copy.
#
# Default: schedule for the next Tuesday 09:00 UTC on push.
# Draft-only: workflow_dispatch with publish=false (creates draft, no send_at).
#
# Manual runs:
#   gh workflow run kit-broadcast.yml --repo agenticstandardcontact-byte/agentic-architect
#   gh workflow run kit-broadcast.yml -f post=04-cursor-result-not-throw.html -f publish=true
#
# Setup (one-time):
#   1. Get a Kit v4 API key: https://app.kit.com/account_settings/developer_settings
#   2. Repo Settings -> Secrets and variables -> Actions -> New repository secret:
#      - Name: KIT_API_KEY     Value: your Kit v4 API key
#
# Skips posts whose subject already exists as a Kit broadcast (de-dupes by title).
# Skips on first run if KIT_API_KEY is unset, with a clear message.

on:
  push:
    branches: [main]
    paths:
      - 'blog/0*.html'
  workflow_dispatch:
    inputs:
      post:
        description: 'Specific post filename under blog/ (e.g. 04-cursor-result-not-throw.html). Leave empty for all eligible posts.'
        required: false
        default: ''
      publish:
        description: 'Schedule for next Tuesday 09:00 UTC (false = draft only)'
        type: boolean
        required: false
        default: true

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create Kit broadcasts for new blog posts
        shell: python {0}
        env:
          KIT_API_KEY: ${{ secrets.KIT_API_KEY }}
          POST_INPUT: ${{ github.event.inputs.post }}
          PUBLISH: ${{ github.event_name == 'push' || github.event.inputs.publish }}
        run: |
          import html
          import json
          import os
          import re
          import subprocess
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          API = "https://api.kit.com/v4"
          SITE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          POST_RE = re.compile(r"^blog/0\d+-.*\.html$")

          api_key = os.environ.get("KIT_API_KEY", "").strip()
          if not api_key:
              # Skip gracefully (exit 0) so the workflow doesn't paint a red X
              # on every blog push before the user has set up Kit. Emits a
              # clear message in the run logs so anyone debugging knows why.
              print(
                  "KIT_API_KEY secret not set - skipping Kit syndication.\n"
                  "Get an API key at https://app.kit.com/account_settings/developer_settings, "
                  "then add it under Settings -> Secrets and variables -> Actions "
                  "to enable automated newsletter broadcasts."
              )
              raise SystemExit(0)

          publish_live = os.environ.get("PUBLISH", "true").lower() == "true"

          def api_request(method, path, payload=None):
              headers = {
                  "X-Kit-Api-Key": api_key,
                  "Accept": "application/json",
                  "User-Agent": "agentic-architect-kit-bot",
              }
              data = None
              if payload is not None:
                  headers["Content-Type"] = "application/json"
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(f"{API}{path}", data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read().decode("utf-8")
                      return resp.status, (json.loads(body) if body else {})
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode("utf-8", errors="ignore")
                  raise RuntimeError(f"Kit API {method} {path} failed: {e.code} {e.reason}\n{err_body}")

          def existing_subjects():
              # Defensive: Kit's response shape may evolve. Handle list/dict variants.
              subjects = set()
              page = 1
              per_page = 500
              while True:
                  _, data = api_request("GET", f"/broadcasts?per_page={per_page}&page={page}")
                  if isinstance(data, list):
                      items = data
                  else:
                      items = data.get("broadcasts") or data.get("data") or []
                  if not items:
                      break
                  for b in items:
                      if not isinstance(b, dict):
                          continue
                      subj = (b.get("subject") or b.get("subject_line")
                              or b.get("preview_text") or "").strip()
                      if subj:
                          subjects.add(subj)
                  if len(items) < per_page:
                      break
                  page += 1
              return subjects

          def next_tuesday_9am_utc():
              now = datetime.now(timezone.utc)
              # Monday=0, Tuesday=1
              days = (1 - now.weekday()) % 7
              if days == 0 and now.hour >= 9:
                  days = 7  # already past 09:00 today; aim for next week
              target = (now + timedelta(days=days)).replace(
                  hour=9, minute=0, second=0, microsecond=0
              )
              return target.isoformat().replace("+00:00", "Z")

          def targets():
              manual = os.environ.get("POST_INPUT", "").strip()
              if manual:
                  p = manual if manual.startswith("blog/") else f"blog/{manual}"
                  return [Path(p)]
              try:
                  out = subprocess.run(
                      ["git", "diff", "--name-only", "HEAD^", "HEAD"],
                      capture_output=True, text=True, check=True,
                  )
                  changed = [x for x in out.stdout.splitlines()
                             if POST_RE.match(x.strip())]
                  if changed:
                      return [Path(x) for x in changed]
              except subprocess.CalledProcessError:
                  pass
              return sorted(Path("blog").glob("0*.html"))

          def parse_post(path: Path):
              raw = path.read_text(encoding="utf-8")
              title_m = re.search(r"<title>(.*?)</title>", raw, re.I | re.S)
              desc_m = re.search(r'<meta name="description" content="([^"]*)"', raw, re.I)
              canon_m = re.search(r'<link rel="canonical" href="([^"]+)"', raw, re.I)
              art_m = re.search(
                  r'<article[^>]*class="[^"]*\bpost\b[^"]*"[^>]*>(.*?)</article>',
                  raw, re.I | re.S,
              )
              if not title_m or not canon_m or not art_m:
                  raise SystemExit(f"Missing title/canonical/article in {path}")

              title = html.unescape(title_m.group(1).strip())
              description = html.unescape(desc_m.group(1).strip()) if desc_m else ""
              canonical = canon_m.group(1).strip()

              body_html = art_m.group(1)
              # Trim everything from the post-divider <hr> onward (CTAs etc.)
              body_html = re.split(
                  r'<hr[^>]+class="[^"]*post-divider[^"]*"', body_html, maxsplit=1,
              )[0]
              # Remove any post-cta blocks (free or paid) that sit inline.
              body_html = re.sub(
                  r'<div[^>]+class="[^"]*post-cta(?:-paid)?[^"]*"[^>]*>.*?</div>',
                  '', body_html, flags=re.I | re.S,
              )
              # Rewrite relative links/images to absolute so they render in email.
              body_html = re.sub(r'\bhref="\.\./', f'href="{SITE}/', body_html)
              body_html = re.sub(r'\bhref="\./',  f'href="{SITE}/blog/', body_html)
              body_html = re.sub(r'\bhref="/',    f'href="{SITE}/', body_html)
              body_html = re.sub(r'\bsrc="\.\./', f'src="{SITE}/', body_html)
              body_html = re.sub(r'\bsrc="/',     f'src="{SITE}/', body_html)

              footer = (
                  '<hr/>'
                  f'<p><em>Originally published at '
                  f'<a href="{canonical}">{canonical}</a>. '
                  f'Part of the <a href="{SITE}/">Agentic Architect</a> '
                  f'persistence kit for Cursor + .NET.</em></p>'
              )

              return {
                  "title": title,
                  "description": description,
                  "canonical_url": canonical,
                  "content_html": body_html.strip() + footer,
              }

          existing = existing_subjects()
          print(f"Found {len(existing)} existing Kit broadcast subject(s)")
          print(f"Mode: {'schedule for next Tue 09:00 UTC' if publish_live else 'draft only'}")

          send_at = next_tuesday_9am_utc() if publish_live else None
          if send_at:
              print(f"Scheduled send_at: {send_at}")

          created = 0
          skipped = 0
          errors = 0
          for path in targets():
              time.sleep(2)  # gentle rate limiting
              if not path.exists():
                  print(f"Skip missing file: {path}")
                  continue
              meta = parse_post(path)
              if meta["title"] in existing:
                  print(f"Skip (broadcast subject already exists): {meta['title']}")
                  skipped += 1
                  continue

              payload = {
                  "subject": meta["title"],
                  "content": meta["content_html"],
                  "description": (meta["description"][:255]
                                  if meta["description"]
                                  else f"Newsletter copy of {meta['canonical_url']}"),
                  "public": False,
              }
              if send_at:
                  payload["send_at"] = send_at

              label = "Scheduling" if send_at else "Creating draft for"
              print(f"{label}: {meta['title']}")
              try:
                  status, data = api_request("POST", "/broadcasts", payload)
                  inner = data.get("broadcast") if isinstance(data, dict) else None
                  bid = (inner or data or {}).get("id", "(unknown)")
                  print(f"  -> {'scheduled' if send_at else 'draft created'} ({status}): broadcast id={bid}")
                  created += 1
              except RuntimeError as e:
                  print(f"  -> error: {e}")
                  errors += 1

          print(f"Done. created={created} skipped={skipped} errors={errors}")
          if errors:
              raise SystemExit(f"{errors} broadcast(s) failed")
