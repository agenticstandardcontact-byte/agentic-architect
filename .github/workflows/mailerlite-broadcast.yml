name: MailerLite Newsletter Broadcast

# Fires on push to main when a new numbered blog post (0*.html) is added to blog/.
# Also supports manual dispatch to trigger a broadcast at any time.
# Reads the latest blog post, extracts title + summary, and schedules a
# MailerLite campaign for the next Tuesday at 09:00 UTC.
#
# Prerequisites:
#   - MAILERLITE_API_KEY repository secret set (MailerLite → Integrations → Developer API)
#   - MAILERLITE_GROUP_ID repository secret set (the subscriber group/list ID in MailerLite)
#
# If MAILERLITE_API_KEY is missing the workflow skips gracefully (exit 0).
# Sender email (agenticstandardcontact@gmail.com) must be verified in your MailerLite account.

on:
  push:
    branches: [main]
    paths:
      - 'blog/0*.html'   # numbered posts only — excludes index.html / other non-post HTML
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Path to the blog post HTML (relative to repo root, e.g. blog/05-foo.html)'
        required: false
        default: ''

jobs:
  broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: Skip if MailerLite secret is not configured
        id: check_secret
        run: |
          if [ -z "${{ secrets.MAILERLITE_API_KEY }}" ]; then
            echo "MAILERLITE_API_KEY not set — skipping broadcast (add the secret to enable)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check_secret.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Find latest blog post
        if: steps.check_secret.outputs.skip == 'false'
        id: find_post
        run: |
          # Use the manually specified post, or find the most recently changed numbered HTML
          if [ -n "${{ github.event.inputs.post_path }}" ]; then
            POST_PATH="${{ github.event.inputs.post_path }}"
          else
            POST_PATH=$(git diff --name-only HEAD~1 HEAD -- 'blog/0*.html' | tail -1)
          fi

          if [ -z "$POST_PATH" ]; then
            echo "No new numbered blog post found in this push — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "post_path=$POST_PATH" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Found post: $POST_PATH"

      - name: Extract post title and first paragraph
        if: steps.check_secret.outputs.skip == 'false' && steps.find_post.outputs.skip == 'false'
        id: extract
        run: |
          POST_PATH="${{ steps.find_post.outputs.post_path }}"

          # Extract <title> tag content
          TITLE=$(grep -oP '(?<=<title>)[^<]+' "$POST_PATH" | head -1 | sed 's/ — Agentic Architect//')

          # Extract first <p> longer than 80 chars (skip short intro snippets)
          SUMMARY=$(grep -oP '(?<=<p>)[^<]{80,}' "$POST_PATH" | head -1 | sed 's/<[^>]*>//g')

          # Derive the public URL from the filename
          FILENAME=$(basename "$POST_PATH")
          POST_URL="https://agenticstandardcontact-byte.github.io/agentic-architect/blog/$FILENAME"

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "post_url=$POST_URL" >> $GITHUB_OUTPUT
          echo "Title: $TITLE"
          echo "URL: $POST_URL"

      - name: Calculate next Tuesday 09:00 UTC
        if: steps.check_secret.outputs.skip == 'false' && steps.find_post.outputs.skip == 'false'
        id: schedule
        run: |
          python3 - <<'EOF'
          import datetime, os
          today = datetime.datetime.utcnow()
          days_until_tuesday = (1 - today.weekday()) % 7  # 1 = Tuesday
          if days_until_tuesday == 0:
              days_until_tuesday = 7  # if today IS Tuesday, push to next week
          send_dt = (today + datetime.timedelta(days=days_until_tuesday)).replace(
              hour=9, minute=0, second=0, microsecond=0
          )
          # MailerLite v2 /schedule endpoint wants date, hours, minutes separately
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"date={send_dt.strftime('%Y-%m-%d')}\n")
              f.write(f"hours={send_dt.strftime('%H')}\n")
              f.write(f"minutes={send_dt.strftime('%M')}\n")
          print(f"Scheduled for: {send_dt.strftime('%Y-%m-%d %H:%M')} UTC")
          EOF

      - name: Create MailerLite campaign and schedule broadcast
        if: steps.check_secret.outputs.skip == 'false' && steps.find_post.outputs.skip == 'false'
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          api_key     = os.environ["MAILERLITE_API_KEY"]
          group_id    = os.environ.get("MAILERLITE_GROUP_ID", "").strip()
          title       = "${{ steps.extract.outputs.title }}"
          summary     = "${{ steps.extract.outputs.summary }}"
          post_url    = "${{ steps.extract.outputs.post_url }}"
          sched_date  = "${{ steps.schedule.outputs.date }}"
          sched_hours = "${{ steps.schedule.outputs.hours }}"
          sched_mins  = "${{ steps.schedule.outputs.minutes }}"

          subject  = f"[Senior Dev Stack] {title}"

          # {{...}} in a Python f-string produces literal {..} in the output HTML.
          # MailerLite's classic template variable for unsubscribe is {$unsubscribe}.
          html_body = (
              f'<html><body style="font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\','
              f'sans-serif;color:#24292f;max-width:600px;margin:0 auto;padding:20px;">'
              f'<p style="color:#57606a;font-size:13px;">Senior Dev Stack &mdash; weekly .NET + AI tooling</p>'
              f'<hr style="border:none;border-top:1px solid #d0d7de;margin:12px 0;">'
              f'<h2 style="font-size:20px;font-weight:600;">{title}</h2>'
              f'<p style="font-size:15px;line-height:1.6;">{summary}</p>'
              f'<p>'
              f'  <a href="{post_url}"'
              f'     style="display:inline-block;background:#0969da;color:#fff;padding:10px 20px;'
              f'            border-radius:6px;text-decoration:none;font-size:14px;font-weight:500;">'
              f'    Read the full post &rarr;'
              f'  </a>'
              f'</p>'
              f'<hr style="border:none;border-top:1px solid #d0d7de;margin:24px 0 12px;">'
              f'<p style="font-size:12px;color:#57606a;">'
              f'  You\'re receiving this because you signed up for the Agentic Architect newsletter.'
              f'  <a href="{{$unsubscribe}}" style="color:#57606a;">Unsubscribe</a>'
              f'</p>'
              f'</body></html>'
          )

          BASE = "https://connect.mailerlite.com/api"
          HEADERS = {
              "Content-Type":  "application/json",
              "Accept":        "application/json",
              "Authorization": f"Bearer {api_key}",
          }

          def api_call(method, path, payload):
              body = json.dumps(payload).encode()
              req  = urllib.request.Request(f"{BASE}{path}", data=body, headers=HEADERS, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  print(f"❌ MailerLite API error {e.code} on {method} {path}: {err}")
                  raise SystemExit(1)

          # MailerLite v2: groups must be string IDs (not integers)
          groups = [group_id] if group_id else []

          # ── Step 1: Create the campaign ──────────────────────────────────────
          # MailerLite v2 requires subject/from/content inside the 'emails' array;
          # putting them at the top level returns 422 "emails field is required".
          campaign_payload = {
              "name": f"Broadcast: {title[:60]}",
              "type": "regular",
              "emails": [{
                  "subject":   subject,
                  "from_name": "Marco — Agentic Architect",
                  "from":      "agenticstandardcontact@gmail.com",
                  "content":   html_body,
              }],
          }
          if groups:
              campaign_payload["groups"] = groups

          data        = api_call("POST", "/campaigns", campaign_payload)
          campaign_id = data.get("data", {}).get("id")
          if not campaign_id:
              print(f"❌ No campaign ID in response: {data}")
              raise SystemExit(1)
          print(f"✅ Campaign created: id={campaign_id}")

          # ── Step 2: Schedule the campaign ────────────────────────────────────
          # MailerLite v2 scheduling is a separate endpoint; passing 'schedule'
          # in the creation payload has no effect.
          # timezone_id=1 = UTC in MailerLite's timezone table.
          schedule_payload = {
              "delivery": "scheduled",
              "schedule": {
                  "date":        sched_date,
                  "hours":       sched_hours,
                  "minutes":     sched_mins,
                  "timezone_id": 1,
              },
          }
          api_call("POST", f"/campaigns/{campaign_id}/schedule", schedule_payload)
          print(f"✅ Scheduled for {sched_date} {sched_hours}:{sched_mins} UTC")
          PYEOF
