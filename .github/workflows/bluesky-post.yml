name: Bluesky Auto-Post

# Posts the latest Daily Senior Rule from blog/index.html to Bluesky.
#
# Triggers:
#   - After Daily Senior Rule Publisher succeeds (new rule on blog)
#   - 09:27 UTC daily (backup, 10 min after the 09:17 rule publish)
#   - Manual workflow_dispatch (optional custom message; bypasses dedup)
#
# Secrets: BLUESKY_HANDLE (no @ prefix), BLUESKY_APP_PASSWORD (app password)
# Profile: https://bsky.app/profile/agentic-architect.bsky.social

on:
  schedule:
    # Off-peak minute — pairs with daily-marketing at 17 9 * * *
    - cron: '27 9 * * *'
  workflow_run:
    workflows: [Daily Senior Rule Publisher]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom post text (empty = auto from latest daily rule)'
        required: false
        default: ''
      force:
        description: 'Post even if this blog/index.html was already posted'
        type: boolean
        required: false
        default: false

jobs:
  skeet:
    runs-on: ubuntu-latest
    # Only chain after daily publisher when that run succeeded
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        id: post-cache
        with:
          path: .cache/bluesky-posted
          key: bluesky-posted-${{ hashFiles('blog/index.html') }}

      - name: Compose and post to Bluesky
        shell: python {0}
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          CUSTOM_MESSAGE: ${{ github.event.inputs.message }}
          FORCE_POST: ${{ github.event.inputs.force }}
          CACHE_HIT: ${{ steps.post-cache.outputs.cache-hit }}
        run: |
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from pathlib import Path

          handle = os.environ.get("BLUESKY_HANDLE", "").strip().lstrip("@")
          password = os.environ.get("BLUESKY_APP_PASSWORD", "").strip()
          custom = os.environ.get("CUSTOM_MESSAGE", "").strip()
          force = os.environ.get("FORCE_POST", "").lower() == "true"
          cache_hit = os.environ.get("CACHE_HIT", "").lower() == "true"

          if not handle or not password:
              raise SystemExit("BLUESKY_HANDLE and BLUESKY_APP_PASSWORD secrets required.")

          if custom:
              text = custom
          else:
              if cache_hit and not force:
                  print("Skip: already posted for this blog/index.html (cache hit).")
                  print("Use workflow_dispatch with force=true to post again.")
                  raise SystemExit(0)
              page = Path("blog/index.html").read_text(encoding="utf-8")
              entry = re.search(
                  r'<li[^>]*data-date="([^"]+)"[^>]*>.*?<h2>(.*?)</h2>\s*<p>(.*?)</p>',
                  page, re.DOTALL,
              )
              if not entry:
                  raise SystemExit("No daily rule found in blog/index.html")
              date, title, body = entry.group(1), entry.group(2).strip(), entry.group(3).strip()
              hook = re.sub(r"^Rule\s+\d+:\s*", "", title)
              SITE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
              footer = f"\n\n{SITE}/blog/#{date}\n#dotnet #csharp #cursor"
              avail = 300 - len(hook) - len(footer) - 4
              if len(body) > avail:
                  body = body[: max(0, avail - 1)].rsplit(" ", 1)[0] + "…"
              text = f"{hook}\n\n{body}{footer}"

          import datetime as dt

          def api(method, url, payload=None, token=None):
              headers = {"Content-Type": "application/json"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              data = json.dumps(payload).encode() if payload else None
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=20) as resp:
                  return json.loads(resp.read().decode())

          session = api("POST", "https://bsky.social/xrpc/com.atproto.server.createSession", {
              "identifier": handle,
              "password": password,
          })
          did = session["did"]
          access = session["accessJwt"]
          pds = session.get("didDoc", {}).get("service", [{}])
          pds_url = next(
              (s.get("serviceEndpoint") for s in pds if s.get("id") == "#atproto_pds"),
              "https://bsky.social",
          )

          now = dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.000Z")
          create_payload = {
              "repo": did,
              "collection": "app.bsky.feed.post",
              "record": {
                  "$type": "app.bsky.feed.post",
                  "text": text[:300],
                  "createdAt": now,
              },
          }
          try:
              result = api(
                  "POST",
                  f"{pds_url}/xrpc/com.atproto.repo.createRecord",
                  create_payload,
                  token=access,
              )
          except urllib.error.HTTPError as e:
              raise SystemExit(f"Bluesky post failed: {e.code} {e.read().decode()}")

          print(f"Posted: {result.get('uri', result)}")

          if not custom:
              Path(".cache/bluesky-posted").mkdir(parents=True, exist_ok=True)
              (Path(".cache/bluesky-posted") / "posted").write_text(now, encoding="utf-8")
