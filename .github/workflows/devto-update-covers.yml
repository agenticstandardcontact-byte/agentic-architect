name: dev.to Cover Image Sync

# Pushes the shared cover URL to every dev.to article you own (blog posts + digests).
# Run after og-image-devto.jpg changes on GitHub Pages, or workflow_dispatch anytime.
#
#   gh workflow run devto-update-covers.yml --repo agenticstandardcontact-byte/agentic-architect

on:
  push:
    branches: [main]
    paths:
      - 'og-image-devto.jpg'
      - 'assets/ai-kit-main.png'
  workflow_dispatch:

jobs:
  sync-covers:
    runs-on: ubuntu-latest
    steps:
      - name: Set main_image on all dev.to articles
        shell: python {0}
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          API = "https://dev.to/api"
          SITE = "https://agenticstandardcontact-byte.github.io/agentic-architect"
          COVER = f"{SITE}/og-image-devto.jpg"

          api_key = os.environ.get("DEVTO_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("DEVTO_API_KEY secret is missing.")

          def api_request(method, path, payload=None):
              headers = {
                  "api-key": api_key,
                  "Content-Type": "application/json",
                  "User-Agent": "agentic-architect-devto-bot",
              }
              data = json.dumps(payload).encode("utf-8") if payload is not None else None
              req = urllib.request.Request(f"{API}{path}", data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read().decode("utf-8")
                      return resp.status, json.loads(body) if body else {}
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode("utf-8", errors="ignore")
                  raise RuntimeError(f"dev.to API {method} {path} failed: {e.code} {e.reason}\n{err_body}")

          articles = []
          page = 1
          while True:
              _, data = api_request("GET", f"/articles/me?per_page=100&page={page}")
              items = data if isinstance(data, list) else []
              if not items:
                  break
              articles.extend(items)
              if len(items) < 100:
                  break
              page += 1

          print(f"Found {len(articles)} article(s). Cover URL: {COVER}")
          updated = 0
          errors = 0
          for art in articles:
              art_id = art.get("id")
              title = (art.get("title") or "").strip()
              time.sleep(2)
              print(f"Refreshing cover: {title} (id={art_id})")
              try:
                  api_request(
                      "PUT",
                      f"/articles/{art_id}",
                      {"article": {"main_image": COVER}},
                  )
                  updated += 1
              except RuntimeError as e:
                  print(f"  → error: {e}")
                  errors += 1

          print(f"Done. updated={updated} errors={errors}")
          if errors:
              raise SystemExit(f"{errors} article(s) failed (often dev.to 429 — re-run later)")
